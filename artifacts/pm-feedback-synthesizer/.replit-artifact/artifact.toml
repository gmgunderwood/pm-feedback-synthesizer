kind = "web"
previewPath = "/"
title = "PM Feedback Synthesizer"
version = "1.0.0"
id = "artifacts/pm-feedback-synthesizer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22890

[services.development]
run = "pnpm --filter @workspace/pm-feedback-synthesizer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pm-feedback-synthesizer", "run", "build" ]
publicDir = "artifacts/pm-feedback-synthesizer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22890"
BASE_PATH = "/"
